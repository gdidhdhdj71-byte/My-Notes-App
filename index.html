<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung Notes Book Style</title>
    <style>
        :root {
            --bg-dark: #000000;          /* Pure black background like screenshot */
            --card-border: #2c2c2c;
            --text-white: #ffffff;
            --text-grey: #8e8e93;
            --accent-orange: #f27b13;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-dark); 
            margin: 0; padding: 0; color: var(--text-white);
            -webkit-tap-highlight-color: transparent;
        }

        /* Top Bar Style */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 20px 10px 20px;
        }
        .top-bar .left-section { display: flex; align-items: center; gap: 15px; }
        .top-bar h1 { font-size: 22px; font-weight: 600; margin: 0; }
        .menu-icon { font-size: 22px; cursor: pointer; }
        .right-icons { display: flex; gap: 20px; font-size: 20px; cursor: pointer; }

        /* Timeline Section (Months) */
        .section-title {
            font-size: 13px; color: var(--text-grey);
            padding: 15px 20px 10px 20px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .container { padding: 0 16px 100px 16px; }

        /* Notes Grid */
        .notes-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

        /* 📔 SAMSUNG REAL BOOK SHAPE CARD 📔 */
        .book-card {
            display: flex; flex-direction: column; cursor: pointer;
            position: relative; transition: transform 0.2s;
        }
        .book-card:active { transform: scale(0.96); }

        /* The Book Cover */
        .book-cover {
            width: 100%; aspect-ratio: 1 / 1; /* Makes it perfect square */
            background: #ffffff; border-radius: 12px;
            position: relative; box-shadow: 0 4px 15px rgba(255,255,255,0.05);
            overflow: hidden; border: 1px solid var(--card-border);
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* Book Spine / Binding Left Line */
        .book-spine {
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 8px; background: rgba(0, 0, 0, 0.08);
            border-right: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 2;
        }

        /* Inside Book Image / Content Preview */
        .book-preview-img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top:0; left:0; z-index: 1;
        }

        /* Samsung Style Corner Tag inside Book */
        .book-tag {
            position: absolute; top: 12px; right: 12px;
            width: 45px; height: 32px; border-radius: 16px;
            background: #fff5e6; display: flex; align-items: center; justify-content: center;
            font-size: 18px; z-index: 3; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Lock Icon Overlay for private notes */
        .lock-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #242426; z-index: 4; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
        }

        /* Book Info Details Below Cover */
        .book-title {
            font-size: 14px; font-weight: 500; color: var(--text-white);
            margin: 8px 4px 2px 4px; text-align: left;
            word-wrap: break-word; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .book-date { font-size: 11px; color: var(--text-grey); margin-left: 4px; }

        /* Full Screen Editor Screen */
        .editor-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; z-index: 1000; flex-direction: column;
        }
        .editor-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; border-bottom: 1px solid #222;
        }
        .back-btn { font-size: 22px; background: none; border: none; color: white; cursor: pointer; }
        .save-btn { background: none; border: none; color: var(--accent-orange); font-size: 16px; font-weight: 600; cursor: pointer; }
        .delete-btn { background: none; border: none; color: #ff3b30; font-size: 16px; cursor: pointer; display: none; }

        .editor-body { padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .input-title { width: 100%; font-size: 22px; font-weight: 700; border: none; outline: none; margin-bottom: 15px; font-family: inherit; background: none; color: white; }
        .input-desc { width: 100%; font-size: 16px; border: none; outline: none; resize: none; flex-grow: 1; font-family: inherit; line-height: 1.5; background: none; color: #ccc; }
        #editorPreview { width: 100%; max-height: 220px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; display: none; }
        
        .editor-toolbar { padding: 15px 20px; border-top: 1px solid #222; display: flex; gap: 20px; background: #1a1a1a; }
        .toolbar-item { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--text-grey); font-weight: 500; }
        #imageInput { display: none; }

        /* 🖊️ SAMSUNG EXACT PEN FAB BUTTON 🖊️ */
        .fab {
            position: fixed; bottom: 30px; right: 24px; width: 56px; height: 56px;
            background-color: #2c2c2e; color: var(--text-white); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 22px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: none; cursor: pointer; z-index: 999;
        }
    </style>
</head>
<body>

    <div id="mainScreen">
        <div class="top-bar">
            <div class="left-section">
                <div class="menu-icon">☰</div>
                <h1>All notes</h1>
            </div>
            <div class="right-icons">
                <span>📄⁺</span>
                <span>🔍</span>
                <span>⋮</span>
            </div>
        </div>

        <div class="section-title" id="favHeader">Favourites ⭐</div>
        <div class="container">
            <div class="notes-grid" id="favGrid"></div>
        </div>

        <div class="section-title" id="recentHeader">Recent Notes</div>
        <div class="container">
            <div class="notes-grid" id="recentGrid"></div>
        </div>

        <button class="fab" onclick="openEditor()">📝</button>
    </div>

    <div class="editor-screen" id="editorScreen">
        <div class="editor-header">
            <button class="back-btn" onclick="closeEditor()">←</button>
            <div style="display: flex; gap: 15px;">
                <button class="delete-btn" id="deleteBtn" onclick="deleteNote()">🗑️ Delete</button>
                <button class="save-btn" onclick="saveNote()">Save</button>
            </div>
        </div>
        <div class="editor-body">
            <img id="editorPreview" alt="Preview">
            <input type="text" class="input-title" id="noteTitle" placeholder="Title">
            <textarea class="input-desc" id="noteDesc" placeholder="Start writing..."></textarea>
        </div>
        <div class="editor-toolbar">
            <label for="imageInput" class="toolbar-item">🖼️ Add Image</label>
            <input type="file" id="imageInput" accept="image/*" onchange="handleImage(event)">
            <button class="toolbar-item" onclick="toggleLock()" style="margin-left: auto;" id="lockToolbarBtn">🔓 Lock</button>
        </div>
    </div>

<script>
    let notes = [];
    let currentEditIndex = null;
    let selectedImageBase64 = "";
    let isCurrentNoteLocked = false;

    // Default book cover backgrounds for premium feel
    const coverColors = ["#dfebf7", "#fdecd2", "#f7dfdf", "#e3dff7", "#e2f7df"];

    document.addEventListener("DOMContentLoaded", () => {
        notes = JSON.parse(localStorage.getItem("samsungBookNotes")) || [];
        displayNotes();
    });

    function displayNotes() {
        let favGrid = document.getElementById("favGrid");
        let recentGrid = document.getElementById("recentGrid");
        
        favGrid.innerHTML = "";
        recentGrid.innerHTML = "";

        let favCount = 0;
        let recentCount = 0;

        notes.forEach((note, index) => {
            let card = document.createElement("div");
            card.className = "book-card";
            card.onclick = () => handleCardClick(index);

            // Setup cover styling
            let coverBg = note.coverColor || coverColors[index % coverColors.length];
            let innerHTML = `
                <div class="book-cover" style="background: ${note.image ? '#fff' : coverBg};">
                    <div class="book-spine"></div>
            `;

            if (note.isLocked) {
                innerHTML += `<div class="lock-overlay">🔒</div>`;
            } else {
                if (note.image) {
                    innerHTML += `<img class="book-preview-img" src="${note.image}">`;
                }
                // Custom Icon Tag inside book like real Samsung notes
                let tagIcon = note.image ? "🖼️" : "💼";
                innerHTML += `<div class="book-tag">${tagIcon}</div>`;
            }

            innerHTML += `
                </div>
                <div class="book-title">${note.isLocked ? "Locked Note" : (note.title || "Untitled")}</div>
                <div class="book-date">${note.date}</div>
            `;
            card.innerHTML = innerHTML;

            // Sort into Favourites or Recent
            if (note.image && favCount < 2) { 
                favGrid.appendChild(card);
                favCount++;
            } else {
                recentGrid.appendChild(card);
                recentCount++;
            }
        });

        // Hide headers if empty
        document.getElementById("favHeader").style.display = favCount > 0 ? "block" : "none";
        document.getElementById("recentHeader").style.display = recentCount > 0 ? "block" : "none";
    }

    function handleCardClick(index) {
        if (notes[index].isLocked) {
            let pin = prompt("Enter Note PIN to unlock (Default: 1234):");
            if (pin !== "1234") {
                return alert("Wrong PIN! Access Denied.");
            }
        }
        openEditor(index);
    }

    function openEditor(index = null) {
        currentEditIndex = index;
        document.getElementById("mainScreen").style.display = "none";
        document.getElementById("editorScreen").style.display = "flex";

        if (index !== null) {
            document.getElementById("noteTitle").value = notes[index].title;
            document.getElementById("noteDesc").value = notes[index].text;
            document.getElementById("deleteBtn").style.display = "block";
            isCurrentNoteLocked = notes[index].isLocked || false;
            
            if (notes[index].image) {
                let prev = document.getElementById("editorPreview");
                prev.src = notes[index].image;
                prev.style.display = "block";
                selectedImageBase64 = notes[index].image;
            } else {
                document.getElementById("editorPreview").style.display = "none";
                selectedImageBase64 = "";
            }
        } else {
            document.getElementById("noteTitle").value = "";
            document.getElementById("noteDesc").value = "";
            document.getElementById("deleteBtn").style.display = "none";
            document.getElementById("editorPreview").style.display = "none";
            selectedImageBase64 = "";
            isCurrentNoteLocked = false;
        }
        updateLockToolbarButton();
    }

    function closeEditor() {
        document.getElementById("mainScreen").style.display = "block";
        document.getElementById("editorScreen").style.display = "none";
        document.getElementById("imageInput").value = "";
    }

    function handleImage(event) {
        let reader = new FileReader();
        reader.onload = function() {
            let prev = document.getElementById("editorPreview");
            prev.src = reader.result;
            prev.style.display = "block";
            selectedImageBase64 = reader.result;
        }
        if(event.target.files[0]) {
            reader.readAsDataURL(event.target.files[0]);
        }
    }

    function toggleLock() {
        isCurrentNoteLocked = !isCurrentNoteLocked;
        if(isCurrentNoteLocked) alert("Note locked! Passcode is 1234");
        updateLockToolbarButton();
    }

    function updateLockToolbarButton() {
        document.getElementById("lockToolbarBtn").innerText = isCurrentNoteLocked ? "🔒 Locked" : "🔓 Lock";
    }

    function saveNote() {
        let title = document.getElementById("noteTitle").value.trim();
        let text = document.getElementById("noteDesc").value.trim();

        if (title === "" && text === "" && selectedImageBase64 === "") {
            return alert("Cannot save an empty note!");
        }

        let now = new Date();
        let dateString = now.getDate() + " " + now.toLocaleString('en-US', { month: 'short' });

        let randomColor = coverColors[Math.floor(Math.random() * coverColors.length)];

        let noteData = {
            title: title,
            text: text,
            image: selectedImageBase64,
            date: dateString,
            isLocked: isCurrentNoteLocked,
            coverColor: currentEditIndex !== null ? notes[currentEditIndex].coverColor : randomColor
        };

        if (currentEditIndex !== null) {
            notes[currentEditIndex] = noteData;
        } else {
            notes.unshift(noteData);
        }

        localStorage.setItem("samsungBookNotes", JSON.stringify(notes));
        closeEditor();
        displayNotes();
    }

    function deleteNote() {
        if (currentEditIndex !== null && confirm("Delete this note permanently?")) {
            notes.splice(currentEditIndex, 1);
            localStorage.setItem("samsungBookNotes", JSON.stringify(notes));
            closeEditor();
            displayNotes();
        }
    }
</script>

</body>
</html>
