<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Cache Cleaner Clone</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --accent-blue: #007aff;
            --accent-green: #34c759;
            --text-white: #ffffff;
            --text-grey: #8b949e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-white);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Header */
        .header {
            width: 100%; padding: 25px 20px;
            box-sizing: border-box; text-align: center;
            border-bottom: 1px solid #21262d;
        }
        .header h1 { font-size: 22px; margin: 0; font-weight: 600; color: var(--accent-blue); }
        .header p { font-size: 13px; color: var(--text-grey); margin: 5px 0 0 0; }

        /* Dashboard Circle */
        .circle-container {
            margin: 40px 0; position: relative;
            width: 200px; height: 200px;
            display: flex; align-items: center; justify-content: center;
        }
        .outer-circle {
            width: 100%; height: 100%;
            border-radius: 50%; border: 6px dashed #21262d;
            position: absolute; animation: rotate 10s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .inner-content {
            text-align: center; z-index: 2;
        }
        .cache-size { font-size: 36px; font-weight: 700; color: var(--text-white); }
        .cache-unit { font-size: 14px; color: var(--text-grey); }

        /* Stats Card */
        .stats-container {
            width: 90%; background: var(--card-bg);
            border-radius: 16px; padding: 20px;
            box-sizing: border-box; margin-bottom: 30px;
            border: 1px solid #30363d;
        }
        .stat-row {
            display: flex; justify-content: space-between; margin-bottom: 12px;
            font-size: 15px;
        }
        .stat-row:last-child { margin-bottom: 0; }
        .stat-label { color: var(--text-grey); }
        .stat-value { font-weight: 600; }

        /* Clean Button */
        .clean-btn {
            width: 85%; padding: 16px;
            background: linear-gradient(135deg, #007aff, #0056b3);
            border: none; border-radius: 25px;
            color: white; font-size: 16px; font-weight: 600;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            transition: 0.2s; text-align: center;
        }
        .clean-btn:active { transform: scale(0.98); }

        /* Scanning Overlay Animation */
        .scanning-text {
            display: none; font-size: 16px; color: var(--accent-green);
            margin-top: 15px; font-weight: 500;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>Zero Cleaner Clone</h1>
        <p>Automated Cache Optimizer</p>
    </div>

    <div class="circle-container">
        <div class="outer-circle" id="circleBorder"></div>
        <div class="inner-content">
            <div class="cache-size" id="cacheDisplay">42.8</div>
            <div class="cache-unit" id="unitDisplay">MB Junk Found</div>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-row">
            <div class="stat-label">System Cache Status</div>
            <div class="stat-value" id="statusText" style="color: #ff453a;">Heavy Junk</div>
        </div>
        <div class="stat-row">
            <div class="stat-label">Apps Analyzed</div>
            <div class="stat-value">24 Apps</div>
        </div>
        <div class="stat-row">
            <div class="stat-label">Last Cleaned</div>
            <div class="stat-value" id="lastCleanTime">Never</div>
        </div>
    </div>

    <button class="clean-btn" id="cleanBtn" onclick="startCleaning()">ONE-TAP CLEAR CACHE</button>
    <div class="scanning-text" id="scanText">Scanning & Clearing App Cache...</div>

<script>
    // Generate a random junk size on load to look realistic
    document.addEventListener("DOMContentLoaded", () => {
        if(localStorage.getItem("isCleaned") === "true") {
            setCleanState();
        } else {
            let randomJunk = (Math.random() * (75 - 20) + 20).toFixed(1);
            document.getElementById("cacheDisplay").innerText = randomJunk;
        }
        
        let lastTime = localStorage.getItem("lastCleanDate");
        if(lastTime) document.getElementById("lastCleanTime").innerText = lastTime;
    });

    function startCleaning() {
        let btn = document.getElementById("cleanBtn");
        let scanText = document.getElementById("scanText");
        let border = document.getElementById("circleBorder");

        btn.disabled = true;
        btn.style.opacity = "0.6";
        scanText.style.display = "block";
        border.style.borderColor = var(--accent-green);
        border.style.animationDuration = "2s"; // Speed up rotation during scan

        // Simulate scanning apps one by one like Zero Cleaner
        let currentSize = parseFloat(document.getElementById("cacheDisplay").innerText);
        let interval = setInterval(() => {
            if(currentSize > 0) {
                currentSize -= (Math.random() * 5).toFixed(1);
                if(currentSize < 0) currentSize = 0;
                document.getElementById("cacheDisplay").innerText = currentSize.toFixed(1);
            }
        }, 200);

        setTimeout(() => {
            clearInterval(interval);
            
            // Clear App Local Storage Cache
            localStorage.clear();
            
            // Update UI to Clean state
            setCleanState();

            // Save state
            let now = new Date();
            let timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            localStorage.setItem("isCleaned", "true");
            localStorage.setItem("lastCleanDate", "Today, " + timeString);
            
            document.getElementById("lastCleanTime").innerText = "Today, " + timeString;
            alert("Cache Optimized successfully! App storage is free.");
        }, 4000); // 4 Seconds scanning animation
    }

    function setCleanState() {
        document.getElementById("cacheDisplay").innerText = "0.0";
        document.getElementById("unitDisplay").innerText = "KB Cache Data";
        document.getElementById("statusText").innerText = "Excellent";
        document.getElementById("statusText").style.color = "#34c759";
        document.getElementById("scanText").style.display = "none";
        
        let btn = document.getElementById("cleanBtn");
        btn.innerText = "SYSTEM OPTIMIZED";
        btn.style.background = "#21262d";
        btn.style.color = "#8b949e";
        btn.style.boxShadow = "none";
        btn.disabled = true;

        let border = document.getElementById("circleBorder");
        border.style.borderColor = "#34c759";
        border.style.animation = "none";
    }
</script>

</body>
</html>
