<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes App</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #333; margin-top: 0; font-size: 24px; }
        textarea { width: 100%; height: 120px; padding: 12px; border-radius: 10px; border: 1px solid #ccd0d5; box-sizing: border-box; resize: none; font-size: 16px; margin-bottom: 10px; }
        textarea:focus { border-color: #1877f2; outline: none; }
        .save-btn { width: 100%; padding: 12px; background-color: #00a884; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .save-btn:hover { background-color: #008f72; }
        .notes-list { margin-top: 25px; }
        .note-item { background: #fffde7; padding: 15px; margin-bottom: 12px; border-left: 5px solid #ffb300; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .note-text { font-size: 16px; color: #333; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; margin-bottom: 10px; }
        .delete-btn { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; border-radius: 6px; cursor: pointer; padding: 6px 12px; font-size: 14px; font-weight: bold; width: 100%; display: block; text-align: center; box-sizing: border-box; transition: 0.2s; }
        .delete-btn:hover { background: #ef9a9a; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 ମୋର ନୋଟ୍ ଆପ୍</h2>
    <textarea id="noteInput" placeholder="ଏଠାରେ ଆପଣଙ୍କର ନୋଟ୍ ଲେଖନ୍ତୁ..."></textarea>
    <button class="save-btn" onclick="addNote()">ନୋଟ୍ ସେଭ୍ କରନ୍ତୁ</button>

    <div class="notes-list" id="notesList"></div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", loadNotes);

    function addNote() {
        let input = document.getElementById("noteInput");
        let text = input.value.trim();
        if (text === "") return alert("ଦୟାକରି କିଛି ଲେଖନ୍ତୁ!");

        let notes = JSON.parse(localStorage.getItem("myNotes")) || [];
        notes.push(text);
        localStorage.setItem("myNotes", JSON.stringify(notes));
        
        input.value = "";
        displayNotes();
    }

    function displayNotes() {
        let notesList = document.getElementById("notesList");
        notesList.innerHTML = "";
        let notes = JSON.parse(localStorage.getItem("myNotes")) || [];

        notes.forEach((note, index) => {
            let div = document.createElement("div");
            div.className = "note-item";
            div.innerHTML = `
                <div class="note-text">${note}</div>
                <button class="delete-btn" onclick="deleteNote(${index})">🗑️ Delete (କାଟିଦିଅନ୍ତୁ)</button>
            `;
            notesList.appendChild(div);
        });
    }

    function deleteNote(index) {
        if(confirm("ଏହି ନୋଟ୍‌ଟିକୁ କାଟିବାକୁ ଚାହାଁନ୍ତି କି?")) {
            let notes = JSON.parse(localStorage.getItem("myNotes")) || [];
            notes.splice(index, 1);
            localStorage.setItem("myNotes", JSON.stringify(notes));
            displayNotes();
        }
    }

    function loadNotes() { displayNotes(); }
</script>

</body>
</html>
