<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung Notes Style App</title>
    <style>
        :root {
            --primary-color: #1a1a1a;
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --accent-color: #f27b13; /* Samsung style warm accent */
            --text-main: #111111;
            --text-sub: #666666;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 0;
            color: var(--text-main);
        }

        /* Samsung Style Big Header */
        .header {
            padding: 40px 24px 20px 24px;
            background-color: var(--bg-color);
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }
        .header .subtitle {
            font-size: 14px;
            color: var(--text-sub);
            margin-top: 5px;
            font-weight: 500;
        }

        .container {
            padding: 0 16px 100px 16px;
        }

        /* Floating Input Dialog (Hidden by Default) */
        .note-dialog {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: flex-end;
        }
        .dialog-content {
            background: var(--card-bg);
            width: 100%;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px;
            box-sizing: border-box;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        textarea { 
            width: 100%; height: 150px; 
            padding: 12px 0; 
            border: none; 
            resize: none; 
            font-size: 18px; 
            color: var(--text-main);
            outline: none;
            font-family: inherit;
        }
        
        /* Photo Selector Styling */
        .photo-btn-wrapper {
            margin: 15px 0;
        }
        .photo-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background-color: #eee;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        #imageInput { display: none; }
        #preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: 14px; margin-bottom: 15px; display: none; }

        /* Action Buttons Inside Dialog */
        .dialog-actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 10px;
        }
        .btn {
            flex: 1; padding: 14px;
            border-radius: 24px; border: none;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .btn-cancel { background: #f1f3f4; color: var(--text-main); }
        .btn-save { background: var(--accent-color); color: white; }

        /* Samsung Style Note Cards Grid */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .note-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid #eaeaea;
            overflow: hidden;
        }
        .note-card img {
            width: 100%; height: 120px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .note-card-text {
            font-size: 15px;
            line-height: 1.4;
            color: var(--text-main);
            word-wrap: break-word;
            white-space: pre-wrap;
            flex-grow: 1;
        }
        .card-delete {
            margin-top: 12px;
            background: none; border: none;
            color: #ff3b30; font-size: 13px;
            font-weight: 600; text-align: left;
            padding: 0; cursor: pointer;
        }

        /* Floating Plus Button (Samsung Style) */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 24px;
            width: 60px;
            height: 60px;
            background-color: var(--accent-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 12px rgba(242, 123, 19, 0.3);
            cursor: pointer;
            border: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Samsung Notes</h1>
        <div class="subtitle" id="noteCount">୦ଟି ନୋଟ୍</div>
    </div>

    <div class="container">
        <div class="notes-grid" id="notesGrid"></div>
    </div>

    <button class="fab" onclick="openDialog()">+</button>

    <div class="note-dialog" id="noteDialog">
        <div class="dialog-content">
            <textarea id="noteInput" placeholder="ଏଠାରେ ଆପଣଙ୍କର ନୋଟ୍ ଲେଖନ୍ତୁ..."></textarea>
            
            <div class="photo-btn-wrapper">
                <label for="imageInput" class="photo-label">🖼️ ଫଟୋ ଆଡ଼ କରନ୍ତୁ</label>
                <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
            </div>
            <img id="preview" alt="Preview">

            <div class="dialog-actions">
                <button class="btn btn-cancel" onclick="closeDialog()">Cancel</button>
                <button class="btn btn-save" onclick="addNote()">ସେଭ୍ କରନ୍ତୁ</button>
            </div>
        </div>
    </div>

<script>
    document.addEventListener("DOMContentLoaded", loadNotes);
    let selectedImageBase64 = "";

    function openDialog() {
        document.getElementById("noteDialog").style.display = "flex";
    }

    function closeDialog() {
        document.getElementById("noteDialog").style.display = "none";
        // Reset Inputs
        document.getElementById("noteInput").value = "";
        selectedImageBase64 = "";
        document.getElementById('preview').style.display = 'none';
        document.getElementById('imageInput').value = "";
    }

    function previewImage(event) {
        let reader = new FileReader();
        reader.onload = function() {
            let preview = document.getElementById('preview');
            preview.src = reader.result;
            preview.style.display = 'block';
            selectedImageBase64 = reader.result;
        }
        if(event.target.files[0]) {
            reader.readAsDataURL(event.target.files[0]);
        }
    }

    function addNote() {
        let input = document.getElementById("noteInput");
        let text = input.value.trim();
        
        if (text === "" && selectedImageBase64 === "") {
            return alert("ଦୟାକରି କିଛି ଲେଖନ୍ତୁ!");
        }

        let notes = JSON.parse(localStorage.getItem("samsungNotes")) || [];
        let newNote = { text: text, image: selectedImageBase64 };
        
        notes.push(newNote);
        localStorage.setItem("samsungNotes", JSON.stringify(notes));
        
        closeDialog();
        displayNotes();
    }

    function displayNotes() {
        let notesGrid = document.getElementById("notesGrid");
        notesGrid.innerHTML = "";
        let notes = JSON.parse(localStorage.getItem("samsungNotes")) || [];
        
        // Update Count
        document.getElementById("noteCount").innerText = notes.length + " ଟି ନୋଟ୍";

        notes.forEach((note, index) => {
            let card = document.createElement("div");
            card.className = "note-card";
            
            let imgHTML = note.image ? `<img src="${note.image}">` : '';
            let textHTML = note.text ? `<div class="note-card-text">${note.text}</div>` : '';

            card.innerHTML = `
                ${imgHTML}
                ${textHTML}
                <button class="card-delete" onclick="deleteNote(${index})">🗑️ Delete</button>
            `;
            notesGrid.appendChild(card);
        });
    }

    function deleteNote(index) {
        if(confirm("ଏହି ନୋଟ୍‌ଟିକୁ କାଟିବାକୁ ଚାହାଁନ୍ତି କି?")) {
            let notes = JSON.parse(localStorage.getItem("samsungNotes")) || [];
            notes.splice(index, 1);
            localStorage.setItem("samsungNotes", JSON.stringify(notes));
            displayNotes();
        }
    }

    function loadNotes() { displayNotes(); }
</script>

</body>
</html>
